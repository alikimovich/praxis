<!doctype html>

<title>Selectable fixture</title>
<style>
  body {
    font: 16px system-ui;
    margin: 0;
    padding: 48px;
    color: #1a1a1a;
  }
  .lede {
    color: #555;
  }
  .card {
    margin-top: 24px;
    padding: 20px;

<body>
  <main data-dsgn-source="src/App.tsx:4">
    <h1 id="hero-title" data-dsgn-source="src/components/Hero.tsx:7">Welcome to dsgn</h1>
    <p class="lede" data-dsgn-source="src/components/Hero.tsx:9">Pick an element on the right.</p>

      <button id="cta" class="btn primary" data-dsgn-source="src/components/Card.tsx:6">
        Get started
      </button>
      <!-- v8 F3a: a host element (from a primitives file) carrying a FORWARDED
           component-instance stamp — the authored <AmountField/> call site. Click
           resolves to the host source; "edit owner" jumps to the instance. -->
      <div
        id="amount"
        class="field"
        data-dsgn-component-source="src/screens/Wallet.tsx:18"
        data-dsgn-source="src/ui/Field.tsx:4"
      >$42.00</div>
    </section>
  </main>
