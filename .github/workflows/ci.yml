name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: node test/run.mjs unit

  # NOTE: The `electron` (Playwright/Electron UI) and `live`
  # (agent-e2e / codex-e2e / sim-e2e) tiers are intentionally NOT run here.
  # They require a display server and/or provider credentials. A self-hosted
  # macOS runner can add them later, e.g.:
  #   - node test/run.mjs electron
  #   - node test/run.mjs live
